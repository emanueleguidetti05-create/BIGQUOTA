<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Quote Serie A</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
}

.container {
    max-width: 900px;
    margin: auto;
}

.match {
    background: #1e293b;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    transition: transform 0.2s;
}

.match:hover {
    transform: scale(1.02);
}

.teams {
    font-size: 20px;
    margin-bottom: 15px;
    font-weight: bold;
}

.odds {
    display: flex;
    gap: 10px;
}

.odd {
    flex: 1;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    background: #334155;
    transition: 0.2s;
    cursor: pointer;
}

.odd:hover {
    background: #22c55e;
    color: black;
}

.label {
    font-size: 14px;
    opacity: 0.7;
}

.value {
    font-size: 20px;
    font-weight: bold;
}

.refresh {
    text-align: center;
    margin-bottom: 20px;
}

button {
    padding: 10px 20px;
    border: none;
    background: #22c55e;
    color: black;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>⚽ Quote Serie A</h1>

<div class="refresh">
    <button onclick="loadData()">🔄 Aggiorna</button>
</div>

<div class="container" id="matches"></div>

<script>
const container = document.getElementById("matches");

function renderMatches(matches) {
    container.innerHTML = "";

    matches.forEach(match => {
        const div = document.createElement("div");
        div.className = "match";

        div.innerHTML = `
            <div class="teams">${match.home} vs ${match.away}</div>
            <div class="odds">
                <div class="odd">
                    <div class="label">1</div>
                    <div class="value">${match.odds["1"] ?? "-"}</div>
                </div>
                <div class="odd">
                    <div class="label">X</div>
                    <div class="value">${match.odds["X"] ?? "-"}</div>
                </div>
                <div class="odd">
                    <div class="label">2</div>
                    <div class="value">${match.odds["2"] ?? "-"}</div>
                </div>
            </div>
        `;

        container.appendChild(div);
    });
}

function loadData() {
    fetch("odds.json")
        .then(res => res.json())
        .then(data => renderMatches(data))
        .catch(err => {
            container.innerHTML = "❌ Errore nel caricamento dati";
            console.error(err);
        });
}

// carica all'avvio
loadData();
</script>

</body>
</html>
